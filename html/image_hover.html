<!DOCTYPE html>
<html>
<head>
  <title>Image Overlay Example</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background-color: #222;
      color: #fff;
      text-align: center;
    }
    h2 {
      color: yellow;
    }
    .container {
      position: relative;
      width: 300px;
      margin: auto;
    }
    .image {
      display: block;
      width: 100%;
      height: auto;
    }
    .overlay {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0,0,0,0.7);
      color: #fff;
      opacity: 0;
      transition: opacity 0.5s ease;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
    }
    .container:hover .overlay {
      opacity: 1;
    }
    .overlay h3 {
      margin: 0;
      font-size: 20px;
    }
    .overlay p {
      margin: 10px 0;
    }
    .overlay button {
      padding: 8px 15px;
      background: #0073e6;
      border: none;
      color: white;
      cursor: pointer;
      border-radius: 4px;
    }
  </style>
</head>
<body>
  <h2>Show Text On Image Hover</h2>
  <div class="container">
    <img src="tree.jpg" alt="Tree Image" class="image">
    <div class="overlay">
      <h3>Card Title</h3>
      <p>This is a sample card description</p>
      <button>Read More</button>
    </div>
  </div>
  <p style="color: lightblue;">HTML & CSS</p>
</body>
</html>
