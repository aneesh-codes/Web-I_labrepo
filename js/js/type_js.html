<!DOCTYPE html>
<html>
<head>
  <title>Types of JavaScript</title>
  <!-- External JavaScript -->
  <script src="script.js"></script>
</head>
<body>
  <h2>JavaScript Types</h2>

  <!-- Inline JavaScript -->
  <button onclick="alert('Hello from Inline JS!')">Click Me</button>

  <!-- Internal JavaScript -->
  <script>
    document.write("<p>Hello from Internal JS!</p>");
  </script>
</body>
</html>
